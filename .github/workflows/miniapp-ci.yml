name: verum-miniapp-ci

on:
  push:
    paths:
      - "miniapp/**"
      - ".github/workflows/miniapp-ci.yml"
  pull_request:
    paths:
      - "miniapp/**"
      - ".github/workflows/miniapp-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Import backend app
        run: python -c "from app.main import app; print(app.title)"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniapp/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: miniapp/frontend/package.json
      - name: Install frontend dependencies
        run: npm install
      - name: Build frontend
        run: npm run build
